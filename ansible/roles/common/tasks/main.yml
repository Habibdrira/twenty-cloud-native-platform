- name: Stop and disable unattended-upgrades
  systemd:
    name: unattended-upgrades
    state: stopped
    enabled: no
    masked: yes
  become: yes

- import_tasks: ensure-apt-not-locked.yml

- name: Disable swap
  shell: |
    sed -i '/ swap / s/^/#/' /etc/fstab
    swapoff -a
  become: yes

- name: Remove swap from fstab
  lineinfile:
    path: /etc/fstab
    regexp: '^([^#].* swap )'
    state: absent
  become: yes

- name: Load kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
  become: yes

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"
  become: yes

- name: Apply and persist sysctl settings
  blockinfile:
    dest: /etc/sysctl.d/k8s.conf
    block: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    create: yes
    owner: root
    group: root
    mode: "0644"
  become: yes

- name: Reload sysctl
  command: sysctl --system
  become: yes
# EOF
