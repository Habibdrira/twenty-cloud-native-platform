- import_tasks: ../../common/tasks/ensure-apt-not-locked.yml

- name: Install Docker packages robustly
  apt:
    name: docker.io
    update_cache: yes
    state: present
    lock_timeout: 300
  become: yes
  register: dockerpkgs
  until: dockerpkgs is succeeded
  retries: 6
  delay: 10

- name: Enable and start Docker
  service:
    name: docker
    state: started
    enabled: true
  become: yes

- name: Create Docker config directory
  file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: yes

- name: Configure Docker daemon
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "exec-opts": ["native.cgroupdriver=systemd"],
        "log-driver": "json-file",
        "log-opts": { "max-size": "100m" },
        "storage-driver": "overlay2"
      }
    owner: root
    group: root
    mode: "0644"
  become: yes

- name: Ensure docker group exists
  group:
    name: docker
    state: present
  become: yes

- name: Create CNI directory
  file:
    path: /opt/cni/bin
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: yes

- name: Download CNI plugins
  get_url:
    url: "https://github.com/containernetworking/plugins/releases/download/v{{ cni_plugins_version }}/cni-plugins-linux-amd64-v{{ cni_plugins_version }}.tgz"
    dest: "/tmp/cni-plugins.tgz"
    mode: "0644"
  become: yes

- name: Extract CNI plugins
  unarchive:
    src: "/tmp/cni-plugins.tgz"
    dest: "/opt/cni/bin"
    remote_src: yes
  become: yes

# ---- CRI-DOCKERD FIX ROBUSTE ----

- name: Check if /usr/bin/cri-dockerd exists and get its type
  stat:
    path: /usr/bin/cri-dockerd
  register: cri_dockerd_stat

- name: Remove /usr/bin/cri-dockerd if it is a directory (idempotent fix)
  file:
    path: /usr/bin/cri-dockerd
    state: absent
  when: cri_dockerd_stat.stat.exists and (cri_dockerd_stat.stat.isdir | default(false))
  become: yes

- name: Download cri-dockerd
  get_url:
    url: "https://github.com/Mirantis/cri-dockerd/releases/download/v{{ cri_dockerd_version }}/cri-dockerd-{{ cri_dockerd_version }}.amd64.tgz"
    dest: "/tmp/cri-dockerd.tgz"
    mode: "0644"
  when: not cri_dockerd_stat.stat.exists or (cri_dockerd_stat.stat.isdir | default(false))
  become: yes

- name: Extract cri-dockerd if absent or after removing directory
  unarchive:
    src: "/tmp/cri-dockerd.tgz"
    dest: "/usr/bin"
    remote_src: yes
  when: not cri_dockerd_stat.stat.exists or (cri_dockerd_stat.stat.isdir | default(false))
  become: yes

# ---- FIN DU FIX ----

- name: Create cri-docker.socket
  copy:
    dest: /etc/systemd/system/cri-docker.socket
    content: |
      [Unit]
      Description=CRI Docker Socket for the API

      [Socket]
      ListenStream=/var/run/cri-dockerd.sock

      [Install]
      WantedBy=sockets.target
    mode: "0644"
  become: yes

- name: Create cri-docker.service
  copy:
    dest: /etc/systemd/system/cri-docker.service
    content: |
      [Unit]
      Description=CRI Docker Daemon
      Documentation=https://docs.mirantis.com
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/cri-dockerd --container-runtime-endpoint unix:///var/run/docker.sock --network-plugin=cni
      Restart=always

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  become: yes

- name: Reload systemd
  command: systemctl daemon-reload
  become: yes

- name: Enable cri-docker.socket
  systemd:
    name: cri-docker.socket
    enabled: yes
    state: started
  become: yes

- name: Enable and start cri-docker.service
  systemd:
    name: cri-docker.service
    enabled: yes
    state: started
  become: yes

- name: Create Docker CLI plugins directory
  file:
    path: /usr/libexec/docker/cli-plugins
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: yes

- name: Check if Docker Compose is already installed
  stat:
    path: /usr/local/lib/docker/cli-plugins/docker-compose
  register: docker_compose_binary

- name: Download Docker Compose
  get_url:
    url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
    dest: "/usr/libexec/docker/cli-plugins/docker-compose"
    mode: "0755"
  when: not docker_compose_binary.stat.exists
  become: yes

- name: Verify Docker Compose installation
  command: docker compose version
  register: compose_version_result
  ignore_errors: yes
  changed_when: false
  become: yes
# EOF
